<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind CSS 测试</title>
  </head>
  <body>
    <div class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 p-8">
      <div class="container mx-auto max-w-4xl">
        <h1 class="text-4xl font-bold text-center mb-8 text-gray-900">Tailwind CSS 功能测试</h1>

        <!-- 间距测试 -->
        <div class="bg-white rounded-3xl p-8 mb-8 shadow-2xl">
          <h2 class="text-2xl font-bold mb-6">间距测试</h2>
          <div class="space-y-4">
            <div class="p-4 bg-blue-100 rounded-xl">Padding 4 (1rem)</div>
            <div class="p-6 bg-green-100 rounded-xl">Padding 6 (1.5rem)</div>
            <div class="p-8 bg-yellow-100 rounded-xl">Padding 8 (2rem)</div>
          </div>
          <div class="grid grid-cols-3 gap-4 mt-6">
            <div class="bg-red-100 p-4 rounded-xl text-center">Gap 4</div>
            <div class="bg-purple-100 p-4 rounded-xl text-center">Gap 4</div>
            <div class="bg-pink-100 p-4 rounded-xl text-center">Gap 4</div>
          </div>
        </div>

        <!-- 颜色和渐变测试 -->
        <div class="bg-white rounded-3xl p-8 mb-8 shadow-2xl">
          <h2 class="text-2xl font-bold mb-6">颜色和渐变测试</h2>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="h-20 bg-gradient-to-r from-blue-500 to-blue-600 rounded-xl"></div>
            <div class="h-20 bg-gradient-to-r from-emerald-500 to-emerald-600 rounded-xl"></div>
            <div class="h-20 bg-gradient-to-r from-violet-500 to-violet-600 rounded-xl"></div>
            <div class="h-20 bg-gradient-to-r from-orange-500 to-orange-600 rounded-xl"></div>
          </div>
        </div>

        <!-- 响应式测试 -->
        <div class="bg-white rounded-3xl p-8 mb-8 shadow-2xl">
          <h2 class="text-2xl font-bold mb-6">响应式测试</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <div class="bg-slate-100 p-4 rounded-xl text-center">列 1</div>
            <div class="bg-slate-200 p-4 rounded-xl text-center">列 2</div>
            <div class="bg-slate-300 p-4 rounded-xl text-center">列 3</div>
            <div class="bg-slate-400 p-4 rounded-xl text-center">列 4</div>
          </div>
        </div>

        <!-- 动画和变换测试 -->
        <div class="bg-white rounded-3xl p-8 mb-8 shadow-2xl">
          <h2 class="text-2xl font-bold mb-6">动画和变换测试</h2>
          <div class="flex gap-4 flex-wrap">
            <button
              class="px-6 py-3 bg-blue-500 text-white rounded-xl hover:bg-blue-600 hover:scale-105 transition-all duration-200"
            >
              悬停缩放
            </button>
            <button
              class="px-6 py-3 bg-green-500 text-white rounded-xl hover:-translate-y-1 transition-transform duration-200"
            >
              悬停上移
            </button>
            <div class="w-4 h-4 bg-red-500 rounded-full animate-pulse"></div>
            <div class="w-4 h-4 bg-yellow-500 rounded-full animate-bounce"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
